name: Rüya Tabirleri RSS

on:
  workflow_dispatch:

  schedule:
  - cron: "*/30 * * * *"

permissions:
  contents: write


jobs:

  build:

    runs-on: ubuntu-latest


    steps:

      - name: Depoyu indir
        uses: actions/checkout@v4


      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 22


      - name: Paketleri yükle
        run: npm install cheerio


      - name: Rüya Tabirleri scriptini çalıştır
        run: node src/ruya-tabirleri.mjs


      - name: Değişiklikleri GitHub'a gönder
        run: |

          git config user.name "github-actions[bot]"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"


          git add .


          if git diff --cached --quiet; then

            echo "Değişiklik yok."

          else

            git commit -m "🤖 Günlük Rüya Tabirleri RSS güncellemesi"

            git push

          fi
